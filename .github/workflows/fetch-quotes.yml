name: Fetch Quotes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 00:00 UTC to keep quotes fresh
    - cron: '0 0 * * *'

jobs:
  fetch-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch quotes from external repo
        run: |
          curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/mariomorvan/quotes/main/quotes.yml \
            -o _data/quotes.yml

      - name: Validate YAML format
        run: |
          if ! grep -q "^-" _data/quotes.yml; then
            echo "❌ quotes.yml appears to be empty or malformed"
            exit 1
          fi
          echo "✅ quotes.yml fetched successfully"
          head -5 _data/quotes.yml

      - name: Commit changes if quotes were updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet _data/quotes.yml; then
            echo "No changes to quotes.yml"
          else
            git add _data/quotes.yml
            git commit -m "chore: update quotes from external repo"
            git push
          fi
